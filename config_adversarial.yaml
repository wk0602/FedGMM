# FedGMM-Adversarial Configuration
# 联邦对抗性遗忘配置文件

# Basic Settings
seed: 1
device: 0
module: CNN_CIFAR10
algorithm: FedGMM_Adversarial
dataloader: DataLoader_cifar10_pat

# Data Settings
N: 10                    # client num
NC: 2                    # client_class_num
balance: True            # balance or not for pathological separation
B: 200                   # batch size
C: 1.0                   # select client proportion

# Training Settings
R: 2000                  # communication round
UR: 2000                 # Unlearning round, must be smaller than R
E: 1                     # local epochs
decay: 0.995             # learning rate decay
step_type: bgd           # step type
lr: 0.005                # learning rate

# Unlearning Settings
unlearn_cn: 1            # unlearn client num
unlearn_pretrain: False  # pretrain the model before unlearning

# ========================================
# Progressive Masking (Direction 1)
# ========================================
# rho(t) follows cosine schedule from rho_min to rho_max:
#   Early: small mask -> precise backdoor targeting, protect shared params
#   Late:  large mask -> sweep residual backdoor in deeper layers
adv_rho_min: 0.10        # starting mask ratio
adv_rho_max: 0.35        # ending mask ratio
adv_mask_refresh: 3      # mask refresh interval (rounds)
adv_mask_ema_beta: 0.9   # EMA smoothing for mask scores (0 disables)
adv_use_grad_divergence: True  # use gradient divergence for mask selection

# ========================================
# Adaptive Alpha-Annealing (Direction 2)
# ========================================
# alpha(t) follows cosine schedule from alpha_init to alpha_max:
#   L = alpha * L_adv + (1 - alpha) * L_KL
#   Early: lower alpha -> more KL regularization for stable start
#   Late:  higher alpha -> strong adversarial pressure, breaks ASR bottleneck
adv_alpha_init: 0.50     # initial adversarial weight
adv_alpha_max: 0.95      # final adversarial weight
adv_temperature: 1.5     # temperature for softmax scaling
adv_weight: 2.0          # overall loss weight

# Early Stopping Settings
early_stop: True
early_stop_threshold: 0.05
early_stop_patience: 15
early_stop_min_delta: 0.001

# Model Settings
save_model: True
